<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Settings - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="userSettings.css" />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>
        <ul class="nav-links">
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="logCalories.html">Log Calories</a></li>
          <li><a href="logExercise.html">Log Exercise</a></li>
          <li><a href="friends.html">Friends</a></li>
          <li class="push-right">
            <a href="myProfile.html" class="active">My Profile</a>
          </li>
          <li><a href="#" class="logoutBtn">Logout</a></li>
        </ul>
      </nav>
    </header>

    <div class="content">
      <div class="log-container">
        <h1 class="page-heading">User <em>Settings</em></h1>

        <div class="total-banner">
          PROFILE
          <span class="cal-number" id="banner-username">Loading…</span>
        </div>

        <!-- Personal Details -->
        <div class="form-card">
          <label>Full Name</label>
          <input type="text" id="real_name" />
          <label>Username</label>
          <input type="text" id="username" />
          <label>Email Address</label>
          <input type="text" id="email" />
          <label>Age</label>
          <input type="number" id="age" />
          <label>Height</label>
          <input type="number" id="height_cm" />
          <label>Weight</label>
          <input type="number" id="weight_kg" />

          <label>Biological Sex</label>
          <div class="meal-options">
            <label class="meal-option"
              ><input type="radio" name="sex" value="male" /><span
                >Male</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="sex" value="female" /><span
                >Female</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="sex" value="other" /><span
                >Other</span
              ></label
            >
          </div>
          <button class="submit-btn" id="save-profile-btn">
            Save Personal Details
          </button>
          <div id="profile-msg"></div>
        </div>

        <!-- Preferences -->
        <div class="form-card">
          <label>Daily Calorie Goal</label>
          <input type="number" id="calorie_goal" />
          <label>Weekly Exercise Goal</label>
          <input type="number" id="weekly_exercise_goal" />

          <label>Units</label>
          <div class="meal-options">
            <label class="meal-option"
              ><input type="radio" name="units" value="metric" /><span
                >Metric</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="units" value="imperial" /><span
                >Imperial</span
              ></label
            >
          </div>

          <label>Notifications</label>
          <div class="meal-options">
            <label class="meal-option"
              ><input type="radio" name="notifications" /><span
                >Enabled</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="notifications" /><span
                >Disabled</span
              ></label
            >
          </div>

          <button class="submit-btn" id="save-prefs-btn">
            Save Preferences
          </button>
          <div id="prefs-msg"></div>
        </div>

        <!-- ════════════════════════════════════════ -->
        <!--  Goals Section — registration style     -->
        <!-- ════════════════════════════════════════ -->
        <section class="goals-manager">
          <div class="goals-section-header">
            <div>
              <span class="goals-eyebrow">Your Goals</span>
              <h2 class="goals-title">Active Goals</h2>
            </div>
          </div>

          <!-- Active goals list -->
          <div class="goal-list" id="goal-list">
            <div class="empty-state">Loading your goals…</div>
          </div>

          <!-- Add new goal -->
          <div class="goals-section-header" style="margin-top: 32px">
            <div>
              <span class="goals-eyebrow">Add a goal</span>
              <h2 class="goals-title">New Goal</h2>
            </div>
          </div>

          <div class="add-goal-section">
            <p class="goal-section-label">Select goal type</p>

            <div class="goal-type-grid" id="goalTypeGrid">
              <div
                class="goal-type-card"
                onclick="selectGoalType(this, 'water')"
              >
                <span class="goal-type-icon">💧</span>
                <span class="goal-type-name">Water</span>
                <span class="goal-type-desc">Daily intake</span>
              </div>
              <div
                class="goal-type-card"
                onclick="selectGoalType(this, 'steps')"
              >
                <span class="goal-type-icon">👟</span>
                <span class="goal-type-name">Steps</span>
                <span class="goal-type-desc">Daily steps</span>
              </div>
              <div
                class="goal-type-card"
                onclick="selectGoalType(this, 'weight_loss')"
              >
                <span class="goal-type-icon">⚖️</span>
                <span class="goal-type-name">Weight</span>
                <span class="goal-type-desc">Weight loss</span>
              </div>
              <div
                class="goal-type-card"
                onclick="selectGoalType(this, 'custom')"
              >
                <span class="goal-type-icon">🎯</span>
                <span class="goal-type-name">Custom</span>
                <span class="goal-type-desc">Anything</span>
              </div>
            </div>

            <!-- Goal details form (shown after selecting type) -->
            <div
              class="goal-details-form"
              id="goalDetailsForm"
              style="display: none"
            >
              <div class="goal-detail-row">
                <label>Goal Name</label>
                <input
                  type="text"
                  id="goal-name"
                  placeholder="e.g. Drink 2L water daily"
                />
              </div>
              <div class="goal-detail-row">
                <label id="goal-target-label">Target</label>
                <input type="text" id="goal-target" placeholder="e.g. 2000" />
              </div>
              <div class="goal-detail-row">
                <label id="goal-current-label">Current Progress</label>
                <input type="text" id="goal-current" placeholder="e.g. 1200" />
              </div>
              <div class="goal-detail-row">
                <label>Deadline (optional)</label>
                <input type="date" id="goal-deadline" />
              </div>
              <div id="goal-add-msg"></div>
              <button type="button" class="goal-save-btn" id="add-goal-btn">
                Save Goal
              </button>
            </div>
          </div>
        </section>

        <!-- Account -->
        <div class="account-actions">
          <button class="secondary-btn">Change Password</button>
          <button class="secondary-btn logout logoutBtn">Log Out</button>
        </div>
      </div>
    </div>

    <script src="nav.js"></script>
    <script src="userSettings.js"></script>
  </body>
</html>
