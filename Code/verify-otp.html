<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Verify Code - Health Tracking System</title>
    <link rel="stylesheet" href="/homepage.css" />
    <link rel="stylesheet" href="/auth.css" />
    <style>
      /* Extra styles for the OTP input boxes */
      .otp-inputs {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 20px 0;
      }

      .otp-inputs input {
        width: 48px;
        height: 56px;
        text-align: center;
        font-size: 24px;
        font-weight: 900;
        border: 2px solid rgba(0, 0, 0, 0.12);
        border-radius: 10px;
        outline: none;
        transition: border-color 0.2s ease;
        font-family: inherit;
        color: #0a0a0a;
        padding: 0;
      }

      .otp-inputs input:focus {
        border-color: #0a0a0a;
      }

      .timer-text {
        text-align: center;
        font-size: 13px;
        color: #999;
        margin-top: 12px;
      }

      .resend-link {
        text-align: center;
        font-size: 13px;
        color: #999;
        margin-top: 10px;
      }

      .resend-link a {
        color: #0a0a0a;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .resend-link a:hover {
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="logCalories.html">Log Calories</a></li>
          <li><a href="logExercise.html">Log Exercise</a></li>
          <li><a href="userSettings.html">User Settings</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <h1 class="site-title">Health Tracking System</h1>

    <div class="content form-page">
      <div class="form-card">
        <h2>Enter Your Code</h2>
        <p
          style="
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
          "
        >
          We sent a 6-digit code to
          <strong id="emailDisplay">your email</strong>
        </p>

        <div
          id="errorBox"
          style="display: none; color: red; font-size: 14px"
        ></div>
        <div
          id="successBox"
          style="display: none; color: green; font-size: 14px"
        ></div>

        <!-- 6 individual digit boxes -->
        <div class="otp-inputs">
          <input type="text" maxlength="1" id="otp1" autofocus />
          <input type="text" maxlength="1" id="otp2" />
          <input type="text" maxlength="1" id="otp3" />
          <input type="text" maxlength="1" id="otp4" />
          <input type="text" maxlength="1" id="otp5" />
          <input type="text" maxlength="1" id="otp6" />
        </div>

        <button type="button" id="verifyBtn" onclick="handleVerify()">
          Verify Code
        </button>

        <div class="timer-text" id="timer">Code expires in 5:00</div>

        <div class="resend-link">
          Didn't get the code? <a onclick="handleResend()">Resend</a>
        </div>

        <p class="form-link" style="margin-top: 16px">
          <a href="forgot-password.html">← Use a different email</a>
        </p>
      </div>
    </div>
    <script src="/verify-otp.js"></script>
  </body>
</html>
