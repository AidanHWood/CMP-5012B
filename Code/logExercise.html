<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log Exercise - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="logExercise.css" />
  </head>

  <body>
<header class="navbar">
  <nav>
    <input type="checkbox" id="menu-toggle" />
    <label for="menu-toggle" class="menu-icon">☰</label>

    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="logCalories.html">Log Calories</a></li>
      <li><a href="logExercise.html" class="active">Log Exercise</a></li>
      <li><a href="friends.html">Friends</a></li>

      <li class="push-right">
        <a href="myProfile.html">My Profile</a>
      </li>
      <li><a href="/" class="logoutBtn">Logout</a></li>
    </ul>
  </nav>
</header>

    <canvas id="waveCanvas"></canvas>

    <div class="content">
      <div class="log-container">
          <h1 class="page-heading">Log <em>Exercise</em></h1>
        <div class="total-banner">
          TODAY'S BURN
          <span class="cal-number" id="totalBurn">0 kcal</span>
        </div>

        <div class="form-card">
          <label>Exercise Type</label>

          <div class="meal-options">
            <label class="meal-option">
              <input
                type="radio"
                name="exercise"
                value="running"
                onchange="onFormChange()"
              />
              <span>Running</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="exercise"
                value="cycling"
                onchange="onFormChange()"
              />
              <span>Cycling</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="exercise"
                value="walking"
                onchange="onFormChange()"
              />
              <span>Walking</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="exercise"
                value="swimming"
                onchange="onFormChange()"
              />
              <span>Swimming</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="exercise"
                value="gym"
                onchange="onFormChange()"
              />
              <span>Gym</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="exercise"
                value="sport"
                onchange="onFormChange()"
              />
              <span>Sport</span>
            </label>
          </div>

          <!-- Distance field — only visible for running, cycling, walking, swimming -->
          <div id="distanceSection" style="display: none">
            <label>Distance (km)</label>
            <input
              type="number"
              id="distance"
              placeholder="e.g. 5.0"
              min="0"
              step="0.1"
              oninput="onFormChange()"
            />
          </div>

          <!-- Weight moved field — only visible for gym -->
          <div id="weightMovedSection" style="display: none">
            <label>Total Weight Moved (kg)</label>
            <input
              type="number"
              id="weightMoved"
              placeholder="e.g. 2500"
              min="0"
              step="1"
            />
          </div>

          <label>Duration (minutes)</label>
          <input
            type="number"
            id="duration"
            placeholder="e.g. 30"
            min="0"
            oninput="onFormChange()"
          />

          <label>Intensity</label>
          <div class="meal-options">
            <label class="meal-option">
              <input
                type="radio"
                name="intensity"
                value="low"
                onchange="onFormChange()"
              />
              <span>Low</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="intensity"
                value="medium"
                onchange="onFormChange()"
              />
              <span>Medium</span>
            </label>
            <label class="meal-option">
              <input
                type="radio"
                name="intensity"
                value="high"
                onchange="onFormChange()"
              />
              <span>High</span>
            </label>
          </div>

          <label>Exercise Notes</label>
          <input type="text" id="notes" placeholder="Optional notes..." />

          <div class="total-banner estimate-banner">
            ESTIMATED BURN
            <span class="cal-number" id="estimatedBurn">0 kcal</span>
          </div>

          <div id="overrideSection">
            <label>Override Calories (leave blank to use estimate)</label>
            <input
              type="number"
              id="caloriesOverride"
              placeholder="e.g. 350"
              min="0"
            />
          </div>

          <button class="submit-btn" onclick="addExercise()">
            + Add Exercise
          </button>
        </div>

        <p class="log-section-title">Today's Exercise Log</p>

        <div id="exerciseLogList">
          <div class="empty-state">No exercise logged yet.</div>
        </div>
      </div>
    </div>
    <script src="logExercise.js"></script>
    <script src="wave.js"></script>
    <script src="nav.js"></script>
  </body>
</html>
