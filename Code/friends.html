<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Friends - Health Tracking System</title>
  <link rel="stylesheet" href="homepage.css" />
  <link rel="stylesheet" href="friends.css" />
</head>
<body>
<header class="navbar">
  <nav>
    <input type="checkbox" id="menu-toggle" />
    <label for="menu-toggle" class="menu-icon">☰</label>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="logCalories.html">Log Calories</a></li>
      <li><a href="logExercise.html">Log Exercise</a></li>
      <li><a href="friends.html" class="active">Friends</a></li>
      <li class="push-right"><a href="myProfile.html">My Profile</a></li>
      <li><a href="/" class="logoutBtn">Logout</a></li>
    </ul>
  </nav>
</header>

<canvas id="waveCanvas"></canvas>

<div class="content">
  <div class="leaderboard-container">
    <h1 class="page-heading">My <em>Friends</em></h1>

    <!-- Search -->
    <div class="section-card">
      <h2 class="section-title">Add a Friend</h2>
      <input type="text" id="friendSearch" class="search-input"
             placeholder="Search by username or name..." oninput="searchUsers()" />
      <div id="searchResults"></div>
    </div>

    <!-- Pending requests -->
    <div class="section-card" id="requestsSection" style="display: none">
      <h2 class="section-title">
        Friend Requests <span id="requestCount" class="badge"></span>
      </h2>
      <div id="requestsList"></div>
    </div>

    <!-- Friends list -->
    <div class="section-card">
      <h2 class="section-title">Your Friends</h2>
      <div id="friendsList">
        <p class="empty-state">No friends yet — search for someone above.</p>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="section-card" id="leaderboardSection">
      <h2 class="section-title">Leaderboard</h2>

      <div class="lb-top-toggles">
        <button class="lb-top-btn active" onclick="setLeaderboardMode('overall', this)">🏆 Overall</button>
        <button class="lb-top-btn" onclick="setLeaderboardMode('activity', this)">🏃 By Activity</button>
      </div>

      <div class="lb-activity-tabs" id="lbActivityTabs" style="display:none;">
        <button class="lb-tab active" data-type="running" onclick="setActivityType('running', this)">Running</button>
        <button class="lb-tab" data-type="cycling" onclick="setActivityType('cycling', this)">Cycling</button>
        <button class="lb-tab" data-type="walking" onclick="setActivityType('walking', this)">Walking</button>
        <button class="lb-tab" data-type="swimming" onclick="setActivityType('swimming', this)">Swimming</button>
        <button class="lb-tab" data-type="gym" onclick="setActivityType('gym', this)">Gym</button>
        <button class="lb-tab" data-type="sport" onclick="setActivityType('sport', this)">Sport</button>
      </div>

      <div id="leaderboardList">
        <div class="empty-state">Loading leaderboard...</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── Sanitise helper ───────────────────────────────────────
  function sanitise(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  let searchTimeout;

  // ── Search users ──────────────────────────────────────────
  async function searchUsers() {
    const q = document.getElementById("friendSearch").value.trim();
    const resultsEl = document.getElementById("searchResults");

    if (q.length < 2 || q.length > 100) { resultsEl.innerHTML = ""; return; }

    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
      try {
        const res = await fetch("/api/friends/search?q=" + encodeURIComponent(q));
        const data = await res.json();

        if (!data.users || data.users.length === 0) {
          resultsEl.innerHTML = '<p class="empty-state">No users found.</p>';
          return;
        }

        resultsEl.innerHTML = data.users.map((u) => {
          let action = "";
          if (u.status === "accepted") {
            action = `<span class="status-badge accepted">Friends</span>`;
          } else if (u.status === "pending" && u.direction === "sent") {
            action = `<span class="status-badge pending">Request Sent</span>`;
          } else if (u.status === "pending" && u.direction === "received") {
            action = `<button class="btn-accept" onclick="acceptRequest(${u.user_id})">Accept</button>`;
          } else {
            action = `<button class="btn-add" onclick="sendRequest(${u.user_id}, this)">+ Add</button>`;
          }
          return `
                <div class="user-row">
                  <div class="user-info">
                    <div class="avatar">${sanitise(u.username)[0].toUpperCase()}</div>
                    <div>
                      <div class="user-name">${sanitise(u.real_name || u.username)}</div>
                      <div class="user-handle">@${sanitise(u.username)}</div>
                    </div>
                  </div>
                  <div>${action}</div>
                </div>`;
        }).join("");
      } catch (err) {
        resultsEl.innerHTML = '<p class="empty-state">Search failed.</p>';
      }
    }, 400);
  }

  // ── Send friend request ───────────────────────────────────
  async function sendRequest(userId, btn) {
    btn.disabled = true;
    btn.textContent = "Sending...";
    try {
      const csrfRes = await fetch('/api/csrf-token');
      const { csrfToken } = await csrfRes.json();
      const res = await fetch("/api/friends/request", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken },
        body: JSON.stringify({ userId, _csrf: csrfToken }),
      });
      const data = await res.json();
      if (data.success) {
        btn.textContent = "Sent ✓";
        btn.classList.replace("btn-add", "btn-sent");
      } else {
        btn.textContent = data.error || "Error";
        btn.disabled = false;
      }
    } catch {
      btn.textContent = "Error";
      btn.disabled = false;
    }
  }

  async function acceptRequest(userId) {
    try {
      const csrfRes = await fetch('/api/csrf-token');
      const { csrfToken } = await csrfRes.json();
      const res = await fetch("/api/friends/accept", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken },
        body: JSON.stringify({ userId, _csrf: csrfToken }),
      });
      const data = await res.json();
      if (data.success) { loadRequests(); loadFriends(); }
    } catch (err) { alert("Error accepting request."); }
  }

  async function removeFriend(userId) {
    if (!confirm("Remove this friend?")) return;
    try {
      const csrfRes = await fetch('/api/csrf-token');
      const { csrfToken } = await csrfRes.json();
      const res = await fetch("/api/friends/reject", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken },
        body: JSON.stringify({ userId, _csrf: csrfToken }),
      });
      const data = await res.json();
      if (data.success) { loadFriends(); loadRequests(); }
    } catch (err) { alert("Error removing friend."); }
  }

  // ── Load pending requests ─────────────────────────────────
  async function loadRequests() {
    try {
      const res = await fetch("/api/friends/requests");
      const data = await res.json();
      const requests = data.requests || [];
      const section = document.getElementById("requestsSection");
      const list = document.getElementById("requestsList");
      const count = document.getElementById("requestCount");

      if (requests.length === 0) { section.style.display = "none"; return; }

      section.style.display = "block";
      count.textContent = requests.length;
      list.innerHTML = requests.map((r) => `
            <div class="user-row">
              <div class="user-info">
                <div class="avatar">${sanitise(r.username)[0].toUpperCase()}</div>
                <div>
                  <div class="user-name">${sanitise(r.real_name || r.username)}</div>
                  <div class="user-handle">@${sanitise(r.username)}</div>
                </div>
              </div>
              <div style="display:flex;gap:8px;">
                <button class="btn-accept" onclick="acceptRequest(${r.user_id})">Accept</button>
                <button class="btn-reject" onclick="removeFriend(${r.user_id})">Decline</button>
              </div>
            </div>`).join("");
    } catch (err) { console.error("Load requests error:", err); }
  }

  // ── Load friends list ─────────────────────────────────────
  async function loadFriends() {
    try {
      const res = await fetch("/api/friends");
      const data = await res.json();
      const friends = data.friends || [];
      const list = document.getElementById("friendsList");

      if (friends.length === 0) {
        list.innerHTML = '<p class="empty-state">No friends yet — search for someone above.</p>';
        return;
      }

      list.innerHTML = friends.map((f) => `
            <div class="user-row">
              <div class="user-info">
                <div class="avatar">${sanitise(f.username)[0].toUpperCase()}</div>
                <div>
                  <div class="user-name">${sanitise(f.real_name || f.username)}</div>
                  <div class="user-handle">@${sanitise(f.username)}</div>
                </div>
              </div>
              <button class="btn-reject" onclick="removeFriend(${f.user_id})">Remove</button>
            </div>`).join("");
    } catch (err) { console.error("Load friends error:", err); }
  }

  // ── Leaderboard ───────────────────────────────────────────
  let lbMode = 'overall';
  let lbActivityType = 'running';

  function setLeaderboardMode(mode, btn) {
    lbMode = mode;
    document.querySelectorAll('.lb-top-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('lbActivityTabs').style.display = mode === 'activity' ? 'flex' : 'none';
    loadLeaderboard();
  }

  function setActivityType(type, btn) {
    lbActivityType = type;
    document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLeaderboard();
  }

  async function loadLeaderboard() {
    const type = lbMode === 'overall' ? 'overall' : lbActivityType;
    const listEl = document.getElementById('leaderboardList');
    listEl.innerHTML = '<div class="empty-state">Loading...</div>';

    try {
      const res = await fetch('/api/leaderboard?type=' + type);
      const data = await res.json();
      const board = data.leaderboard || [];

      if (!board.length) {
        listEl.innerHTML = '<div class="empty-state">No data yet this week.</div>';
        return;
      }

      listEl.innerHTML = '';

      const weekLabel = document.createElement('div');
      weekLabel.className = 'lb-week-label';
      const now = new Date();
      const monday = new Date(now);
      monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      weekLabel.textContent = `Week of ${fmt(monday)} – ${fmt(sunday)}`;
      listEl.appendChild(weekLabel);

      // Pinned "You" row
      const me = board.find(u => u.is_current_user);
      if (me) listEl.appendChild(buildRow(me, true));

      // Ranked list
      board.forEach(user => listEl.appendChild(buildRow(user, false)));

    } catch (err) {
      listEl.innerHTML = '<div class="empty-state">Failed to load leaderboard.</div>';
      console.error('Leaderboard error:', err);
    }
  }

  function buildRow(user, isPinned) {
    const row = document.createElement('div');
    row.className = 'lb-row' +
            (isPinned ? ' pinned' : '') +
            (user.is_current_user && !isPinned ? ' current-user' : '');

    const rankEl = document.createElement('div');
    rankEl.className = 'lb-rank';
    if (isPinned) {
      rankEl.textContent = '📍';
    } else {
      rankEl.textContent = '#' + user.rank;
      if (user.rank === 1) rankEl.classList.add('gold');
      else if (user.rank === 2) rankEl.classList.add('silver');
      else if (user.rank === 3) rankEl.classList.add('bronze');
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'lb-name';
    nameEl.textContent = user.display_name;

    if (user.is_current_user) {
      const badge = document.createElement('span');
      badge.className = 'lb-you-badge';
      badge.textContent = 'You';
      nameEl.appendChild(badge);
    }

    const calsEl = document.createElement('div');
    calsEl.className = 'lb-cals';
    calsEl.textContent = user.calories.toLocaleString() + ' kcal';

    row.appendChild(rankEl);
    row.appendChild(nameEl);
    row.appendChild(calsEl);
    return row;
  }

  // Refresh on tab visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadLeaderboard();
  });

  loadRequests();
  loadFriends();
  loadLeaderboard();
</script>

<script src="wave.js"></script>
<script src="nav.js"></script>
</body>
</html>
