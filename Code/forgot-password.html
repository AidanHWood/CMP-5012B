<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="login.html" class="active">Login</a></li>
        </ul>
      </nav>
    </header>

    <canvas id="waveCanvas"></canvas>

    <div class="content form-page">
      <div class="form-card">
        <h1 class="page-heading">Forgot <em>Password</em></h1>        
        <p
          style="
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
          "
        >
          Enter your email and we'll send you a 6-digit reset code.
        </p>

        <div
          id="errorBox"
          style="display: none; color: red; font-size: 14px"
        ></div>
        <div
          id="successBox"
          style="display: none; color: green; font-size: 14px"
        ></div>

        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          placeholder="Enter your email"
          required
        />

        <button type="button" id="sendBtn" onclick="handleForgot()">
          Send Reset Code
        </button>

        <p class="form-link">
          <a href="login.html">← Back to login</a>
        </p>
      </div>
    </div>

    <script>
      // Allow Enter key to submit
      document
        .getElementById("email")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") handleForgot();
        });

      async function handleForgot() {
        const email = document.getElementById("email").value.trim();
        const errorBox = document.getElementById("errorBox");
        const successBox = document.getElementById("successBox");
        const btn = document.getElementById("sendBtn");

        errorBox.style.display = "none";
        successBox.style.display = "none";

        if (!email) {
          errorBox.textContent = "Please enter your email address.";
          errorBox.style.display = "block";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
          // Get CSRF token first (your existing pattern)
          const csrfRes = await fetch("/api/csrf-token", {
            credentials: "same-origin",
          });
          const csrfData = await csrfRes.json();

          const res = await fetch("/api/forgot-password", {
            method: "POST",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
              "X-CSRF-Token": csrfData.csrfToken,
            },
            body: JSON.stringify({ email, _csrf: csrfData.csrfToken }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorBox.textContent = data.errors
              ? data.errors.join(" ")
              : "Something went wrong.";
            errorBox.style.display = "block";
          } else {
            successBox.textContent =
              "Check your email for a 6-digit code. Redirecting...";
            successBox.style.display = "block";

            setTimeout(() => {
              window.location.href = "verify-otp.html";
            }, 2000);
          }
        } catch (err) {
          errorBox.textContent = "Network error. Please try again.";
          errorBox.style.display = "block";
        }

        btn.disabled = false;
        btn.textContent = "Send Reset Code";
      }
    </script>

    <script src="wave.js"></script>

  </body>
</html>
