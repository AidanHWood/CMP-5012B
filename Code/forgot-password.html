<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Health Tracking System</title>

    <link rel="stylesheet" href="homepage.css">
    <link rel="stylesheet" href="auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<header class="navbar">
    <nav>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<canvas id="waveCanvas"></canvas>

<main class="form-page">
    <div class="form-card">
        <h2>Forgot password</h2>

        <p class="form-text">
            Enter your email and we’ll send you a 6-digit reset code.
        </p>

        <div id="errorBox" style="display:none;"></div>
        <div id="successBox" style="display:none;"></div>

        <label for="email">Email Address</label>
        <input id="email" type="email" required>

        <button type="button" id="sendBtn" onclick="handleForgot()">Send Reset Code</button>

        <p class="form-link">
            <a href="login.html">← Back to login</a>
        </p>
    </div>
</main>

<script>
    document.getElementById("email").addEventListener("keydown", function (e) {
        if (e.key === "Enter") handleForgot();
    });

    async function handleForgot() {
        const email = document.getElementById("email").value.trim();
        const errorBox = document.getElementById("errorBox");
        const successBox = document.getElementById("successBox");
        const btn = document.getElementById("sendBtn");

        errorBox.style.display = "none";
        successBox.style.display = "none";

        if (!email) {
            errorBox.textContent = "Please enter your email address.";
            errorBox.style.display = "block";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
            const csrfRes = await fetch("/api/csrf-token", {
                credentials: "same-origin",
            });

            const csrfData = await csrfRes.json();

            const res = await fetch("/api/forgot-password", {
                method: "POST",
                credentials: "same-origin",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRF-Token": csrfData.csrfToken,
                },
                body: JSON.stringify({ email, _csrf: csrfData.csrfToken }),
            });

            const data = await res.json();

            if (!res.ok) {
                errorBox.textContent = data.errors ? data.errors.join(" ") : "Something went wrong.";
                errorBox.style.display = "block";
            } else {
                successBox.textContent = "Check your email for a 6-digit code. Redirecting...";
                successBox.style.display = "block";

                localStorage.setItem("resetEmail", email);

                setTimeout(() => {
                    window.location.href = "verify-otp.html";
                }, 2000);
            }
        } catch (err) {
            errorBox.textContent = "Network error. Please try again.";
            errorBox.style.display = "block";
        }

        btn.disabled = false;
        btn.textContent = "Send Reset Code";
    }
</script>

<script>
    const canvas = document.getElementById("waveCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    let t = 0;
    const LINES = 18;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const h = canvas.height;
        const w = canvas.width;

        for (let i = 0; i < LINES; i++) {
            const progress = i / LINES;
            const y = h * 0.3 + h * 0.4 * progress;

            ctx.beginPath();
            ctx.moveTo(0, y);

            for (let x = 0; x <= w; x += 4) {
                const wave =
                    Math.sin((x / w) * Math.PI * 3 + t + progress * 2) * 40 +
                    Math.sin((x / w) * Math.PI * 5 + t * 1.3 + progress) * 20 +
                    Math.sin((x / w) * Math.PI * 2 - t * 0.7) * 30;

                ctx.lineTo(x, y + wave);
            }

            ctx.strokeStyle = "hsla(100, 50%, 65%, 10)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        t += 0.008;
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
