<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Health Tracking System</title>

    <link rel="stylesheet" href="homepage.css">
    <link rel="stylesheet" href="auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
    <nav>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<canvas id="waveCanvas"></canvas>

<main class="form-page">
    <form class="form-card">

        <h2>Create account</h2>

        <div id="errorBox" style="display:none;"></div>
        <div id="successBox" style="display:none;"></div>

        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>

        <label for="real_name">Full Name</label>
        <input id="real_name" name="real_name" type="text" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <p style="font-size:12px; color:#6b7c6e; margin:0 0 12px 0">
            Must be at least 8 characters and include uppercase, lowercase, number and symbol.
        </p>

        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required>

        <label for="height_cm">Height (cm)</label>
        <input id="height_cm" name="height_cm" type="number">

        <label for="weight_kg">Weight (kg)</label>
        <input id="weight_kg" name="weight_kg" type="number">

        <label for="age">Age</label>
        <input id="age" name="age" type="number">

        <label for="gender">Gender</label>
        <select id="gender" name="gender">
            <option value="">Prefer not to say</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <button type="button" id="registerBtn" onclick="handleRegister()">Create Account</button>

        <p class="form-link">
            Already have an account? <a href="login.html">Login</a>
        </p>

    </form>
</main>

<script src="/register.js"></script>

<script>
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let t = 0;
const LINES = 18;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const h = canvas.height;
    const w = canvas.width;

    for (let i = 0; i < LINES; i++) {
        const progress = i / LINES;
        const y = h * 0.3 + h * 0.4 * progress;

        ctx.beginPath();
        ctx.moveTo(0, y);

        for (let x = 0; x <= w; x += 4) {
            const wave =
                Math.sin((x / w) * Math.PI * 3 + t + progress * 2) * 40 +
                Math.sin((x / w) * Math.PI * 5 + t * 1.3 + progress) * 20 +
                Math.sin((x / w) * Math.PI * 2 - t * 0.7) * 30;

            ctx.lineTo(x, y + wave);
        }

        ctx.strokeStyle = "hsla(100, 50%, 65%, 10)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    t += 0.008;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
