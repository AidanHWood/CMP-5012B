<!--register page -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="login.html" class="active">Login</a></li>
        </ul>
      </nav>
    </header>

    <canvas id="waveCanvas"></canvas>

    <h1 class="site-title">Health Tracking System</h1>

    <div class="content form-page">
      <form class="form-card">
        <h2>Create Account</h2>

        <div id="errorBox" style="display: none; color: red"></div>
        <div id="successBox" style="display: none; color: green"></div>

        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="Enter username"
          required
        />

        <label for="real_name">Full Name</label>
        <input
          id="real_name"
          name="real_name"
          type="text"
          placeholder="Enter full name"
          required
        />

        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="Enter email"
          required
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Enter password"
          required
        />
        <p style="font-size: 12px; color: #888; margin: 0px 0 12px 0">
          Must be at least 8 characters and include an uppercase letter,
          lowercase letter, number, and special character (e.g. !@#$%).
        </p>

        <label for="confirm_password">Confirm Password</label>
        <input
          id="confirm_password"
          name="confirm_password"
          type="password"
          placeholder="Confirm password"
          required
        />

        <label for="height_cm">Height (cm)</label>
        <input
          id="height_cm"
          name="height_cm"
          type="number"
          placeholder="Enter height"
        />

        <label for="weight_kg">Weight (kg)</label>
        <input
          id="weight_kg"
          name="weight_kg"
          type="number"
          placeholder="Enter weight"
        />

        <label for="DoB">Date of Birth</label>
        <input id="DoB" name="DoB" type="date" placeholder="Enter date of birth" />

        <label for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="">Prefer not to say</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <button type="button" id="registerBtn" onclick="handleRegister()">
          Create Account
        </button>

        <p class="form-link">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </div>

    <script src="/register.js"></script>
    <script src="wave.js"></script>

  </body>
</html>
