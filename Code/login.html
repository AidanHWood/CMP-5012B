<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<header class="navbar">
    <nav>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>
</header>

<canvas id="waveCanvas"></canvas>

<main class="form-page">
    <form class="form-card">
        <h2>Sign in</h2>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Login</button>

        <p class="form-link">
            Don’t have an account? <a href="register.html">Register</a>
        </p>

        <p class="form-link">
            <a href="forgot-password.html">Forgotten password?</a>
        </p>

        <p id="errorBox" hidden></p>
    </form>
</main>

<script src="login.js"></script>

<script>
    const canvas = document.getElementById("waveCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    let t = 0;
    const LINES = 18;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const h = canvas.height;
        const w = canvas.width;

        for (let i = 0; i < LINES; i++) {
            const progress = i / LINES;
            const y = h * 0.3 + h * 0.4 * progress;

            ctx.beginPath();
            ctx.moveTo(0, y);

            for (let x = 0; x <= w; x += 4) {
                const wave =
                    Math.sin((x / w) * Math.PI * 3 + t + progress * 2) * 40 +
                    Math.sin((x / w) * Math.PI * 5 + t * 1.3 + progress) * 20 +
                    Math.sin((x / w) * Math.PI * 2 - t * 0.7) * 30;

                ctx.lineTo(x, y + wave);
            }

            ctx.strokeStyle = "hsla(100, 50%, 65%, 10)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        t += 0.008;
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
