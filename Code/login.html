<!--
========================================================
File: login.html
Description: User authentication page providing secure
login functionality with password visibility toggle and
navigation to account recovery and registration pages.
========================================================
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="login.html" class="active">Login</a></li>
        </ul>
      </nav>
    </header>

    <canvas id="waveCanvas"></canvas>

    <main class="form-page">
      <form class="form-card">
        <h1 class="page-heading">Sign <em>in</em></h1>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
        <label>
          Show Password
          <input type="checkbox" onclick="togglePassword()"/>

        </label>

        <button type="button" id="loginBtn" onclick="handleLogin()">
          Login
        </button>

        <p class="form-link">
          Don’t have an account? <a href="register.html">Register</a>
        </p>

        <p class="form-link">
          <a href="forgot-password.html">Forgotten password?</a>
        </p>

        <div id="errorBox" style="display: none; color: red"></div>
      </form>
    </main>

    <script src="login.js"></script>
    <script src="wave.js"></script>
  </body>
</html>
