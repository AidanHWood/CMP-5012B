<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password - Health Tracking System</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="logCalories.html">Log Calories</a></li>
          <li><a href="logExercise.html">Log Exercise</a></li>
          <li><a href="userSettings.html">User Settings</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <canvas id="waveCanvas"></canvas>

    <h1 class="site-title">Health Tracking System</h1>

    <div class="content form-page">
      <div class="form-card">
        <h2>Set New Password</h2>
        <p
          style="
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
          "
        >
          Choose a strong new password for your account.
        </p>

        <div
          id="errorBox"
          style="display: none; color: red; font-size: 14px"
        ></div>
        <div
          id="successBox"
          style="display: none; color: green; font-size: 14px"
        ></div>

        <label for="password">New Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter new password"
          required
        />
        <p style="font-size: 12px; color: #888; margin: -8px 0 12px 0">
          Must be at least 8 characters and include an uppercase letter,
          lowercase letter, number, and special character (e.g. !@#$%).
        </p>

        <label for="confirm_password">Confirm New Password</label>
        <input
          id="confirm_password"
          type="password"
          placeholder="Confirm new password"
          required
        />

        <button type="button" id="resetBtn" onclick="handleReset()">
          Reset Password
        </button>
      </div>
    </div>
    <script src="reset-password.js"></script>
    <script src="wave.js"></script>
  </body>
</html>
