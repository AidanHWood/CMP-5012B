<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password - Health Tracking System</title>
    <link rel="stylesheet" href="/homepage.css" />
    <link rel="stylesheet" href="/auth.css" />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>

        <ul class="nav-links">
          <li><a href="homepage.html">Home</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="logCalories.html">Log Calories</a></li>
          <li><a href="logExercise.html">Log Exercise</a></li>
          <li><a href="userSettings.html">User Settings</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <h1 class="site-title">Health Tracking System</h1>

    <div class="content form-page">
      <div class="form-card">
        <h2>Set New Password</h2>
        <p
          style="
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
          "
        >
          Choose a strong new password for your account.
        </p>


        <div
          id="errorBox"
          style="display: none; color: red; font-size: 14px"
        ></div>
        <div
          id="successBox"
          style="display: none; color: green; font-size: 14px"
        ></div>

        <label for="password">New Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter new password"
          required
        />
        <p style="font-size:12px; color:#888; margin: -8px 0 12px 0;">
          Must be at least 8 characters and include an uppercase letter, lowercase letter, number, and special character (e.g. !@#$%).
        </p>

        <label for="confirm_password">Confirm New Password</label>
        <input
          id="confirm_password"
          type="password"
          placeholder="Confirm new password"
          required
        />

        <button type="button" id="resetBtn" onclick="handleReset()">
          Reset Password
        </button>
      </div>
    </div>

    <script>
      // Allow Enter key to submit
      document
        .getElementById("confirm_password")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") handleReset();
        });

      function validatePassword(password) {
        const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
        return regex.test(password);
      }

      async function handleReset() {
        const password = document.getElementById("password").value;
        const confirm_password =
          document.getElementById("confirm_password").value;
        const errorBox = document.getElementById("errorBox");
        const successBox = document.getElementById("successBox");
        const btn = document.getElementById("resetBtn");

        errorBox.style.display = "none";
        successBox.style.display = "none";

        if (!password || !validatePassword(password)) {
          errorBox.textContent = 'Password must be at least 8 characters and contain an uppercase letter, lowercase letter, number, and special character.';
          errorBox.style.display = 'block';
          return;
        }
        if (password !== confirm_password) {
          errorBox.textContent = "Passwords do not match.";
          errorBox.style.display = "block";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Resetting...";

        try {
          const res = await fetch("/api/reset-password", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password, confirm_password }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorBox.textContent = data.errors
              ? data.errors.join(" ")
              : "Reset failed.";
            errorBox.style.display = "block";
          } else {
            successBox.textContent = "Password reset! Redirecting to login...";
            successBox.style.display = "block";

            // Clean up
            localStorage.removeItem("resetEmail");

            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          }
        } catch (err) {
          errorBox.textContent = "Network error. Please try again.";
          errorBox.style.display = "block";
        }

        btn.disabled = false;
        btn.textContent = "Reset Password";
      }
    </script>
  </body>
</html>
