<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Log Calories</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="logCalories.css" />
  </head>
  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="logCalories.html">Log Calories</a></li>
            <li><a href="logExercise.html">Log Exercise</a></li>
            <li><a href="userSettings.html">User Settings</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <div class="content">
      <div class="log-container">
        <h1 class="page-heading">Log Calories</h1>

        <div class="total-banner">
          TODAY'S TOTAL
          <span class="cal-number" id="totalCals">0 kcal</span>
        </div>

        <div class="form-card">
          <label>Meal Type</label>
          <div class="meal-options">
            <label class="meal-option">
              <input type="radio" name="meal" value="breakfast" />
              <span>Breakfast</span>
            </label>
            <label class="meal-option">
              <input type="radio" name="meal" value="lunch" />
              <span>Lunch</span>
            </label>
            <label class="meal-option">
              <input type="radio" name="meal" value="dinner" />
              <span>Dinner</span>
            </label>
            <label class="meal-option">
              <input type="radio" name="meal" value="snack" />
              <span>Snack</span>
            </label>
          </div>

          <div class="entry-mode-buttons">
            <button type="button" onclick="showMode('lookup')">
              Lookup Food
            </button>
            <button type="button" onclick="showMode('manual')">
              Manual Entry
            </button>
          </div>

          <div id="lookupSection" style="display: none">
            <label>Search Food</label>
            <input
              type="text"
              id="foodSearch"
              placeholder="Search for a food..."
              oninput="searchFood()"
            />
            <div id="searchResults"></div>
          </div>

          <div id="manualSection" style="display: none">
            <label>Description</label>
            <input
              type="text"
              id="description"
              placeholder="e.g. Chicken salad"
            />
            <label>Calories</label>
            <input type="number" id="calories" placeholder="e.g. 450" min="0" />
          </div>

          <button class="submit-btn" onclick="addLog()">+ Add Entry</button>
        </div>

        <p class="log-section-title">Today's Log</p>
        <div id="logList">
          <div class="empty-state">
            No entries yet — add your first meal above.
          </div>
        </div>
      </div>
    </div>

    <script>
      function showMode(mode) {
        document.getElementById("lookupSection").style.display =
          mode === "lookup" ? "block" : "none";
        document.getElementById("manualSection").style.display =
          mode === "manual" ? "block" : "none";

        const buttons = document.querySelectorAll(".entry-mode-buttons button");
        buttons[0].classList.toggle("active", mode === "lookup");
        buttons[1].classList.toggle("active", mode === "manual");
      }

      let logs = [];

      async function addLog() {
        const mealEl = document.querySelector('input[name="meal"]:checked');
        const calories = document.getElementById("calories").value;
        const description = document.getElementById("description").value;

        if (!mealEl) return alert("Please select a meal type.");
        if (!calories || calories <= 0)
          return alert("Please enter a valid calorie amount.");

        try {
          const res = await fetch("/api/calories", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              meal: mealEl.value,
              calories: Number(calories),
              description: description || "No description",
            }),
          });
          if (!res.ok) throw new Error("Failed to save");

          mealEl.checked = false;
          document.getElementById("calories").value = "";
          document.getElementById("description").value = "";

          loadLogs();
        } catch (err) {
          alert("Error saving entry. Is the server running?");
        }
      }

      async function deleteLog(id) {
        try {
          await fetch("/api/calories/" + id, { method: "DELETE" });
          loadLogs();
        } catch (err) {
          alert("Error deleting entry.");
        }
      }

      async function loadLogs() {
        try {
          const res = await fetch("/api/calories");
          logs = await res.json();

          const total = logs.reduce((sum, l) => sum + l.calories, 0);
          document.getElementById("totalCals").textContent = total + " kcal";

          const listEl = document.getElementById("logList");
          if (logs.length === 0) {
            listEl.innerHTML =
              '<div class="empty-state">No entries yet — add your first meal above.</div>';
            return;
          }

          listEl.innerHTML = logs
            .slice()
            .reverse()
            .map(
              (log) => `
                            <div class="log-entry">
                                <div class="entry-left">
                                    <span class="meal-tag">${log.meal}</span>
                                    <span class="entry-desc">${log.description}</span>
                                </div>
                                <div class="entry-right">
                                    <span class="entry-cals">${log.calories} <small>kcal</small></span>
                                    <button class="delete-btn" onclick="deleteLog(${log.id})">&times;</button>
                                </div>
                            </div>
                        `,
            )
            .join("");
        } catch (err) {}
      }

      async function searchFood() {
        const query = document.getElementById("foodSearch").value;
        if (query.length < 2) return;
        // This won't work until the database is connected
        // For now it'll just fail silently
        try {
          const res = await fetch("/api/foods/search?q=" + query);
          const foods = await res.json();
          document.getElementById("searchResults").innerHTML = foods
            .map(
              (f) => `
                            <div class="food-result" onclick="selectFood(${f.food_id}, '${f.food_name}', ${f.calories})">
                                ${f.food_name} — ${f.calories} kcal
                            </div>
                        `,
            )
            .join("");
        } catch (err) {}
      }

      loadLogs();
    </script>
  </body>
</html>
