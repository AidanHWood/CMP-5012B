<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log Calories</title>
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="logCalories.css" />
  </head>
  <body>
    <header class="navbar">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <ul class="nav-links">
          <!-- <li><a href="homepage.html">Home</a></li> -->
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="logCalories.html" class="active">Log Calories</a></li>
          <li><a href="logExercise.html">Log Exercise</a></li>
          <li><a href="userSettings.html">User Settings</a></li>
          <li><a href="login.html">Logout</a></li>
        </ul>
      </nav>
    </header>

    <div class="content">
      <div class="log-container">
        <h1 class="page-heading">Log Calories</h1>

        <div class="total-banner">
          TODAY'S TOTAL
          <span class="cal-number" id="totalCals">0 kcal</span>
        </div>

        <div class="form-card">
          <label>Meal Type</label>
          <div class="meal-options">
            <label class="meal-option"
              ><input type="radio" name="meal" value="breakfast" /><span
                >Breakfast</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="meal" value="lunch" /><span
                >Lunch</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="meal" value="dinner" /><span
                >Dinner</span
              ></label
            >
            <label class="meal-option"
              ><input type="radio" name="meal" value="snack" /><span
                >Snack</span
              ></label
            >
          </div>

          <div class="entry-mode-buttons">
            <button type="button" onclick="showMode('lookup')">
              Lookup Food
            </button>
            <button type="button" onclick="openManual()">Manual Entry</button>
          </div>

          <!-- Lookup mode -->
          <div id="lookupSection" style="display: none">
            <label>Search Food</label>
            <input
              type="text"
              id="foodSearch"
              placeholder="Search for a food..."
              oninput="searchFood()"
            />
            <div id="searchResults"></div>
            <input type="hidden" id="selectedFoodId" />
            <div id="selectedFood" style="display: none; margin-top: 10px">
              <strong id="selectedFoodName"></strong>
              <span id="selectedFoodCals"></span>
            </div>
            <label style="margin-top: 10px">Quantity (grams)</label>
            <input
              type="number"
              id="quantityGrams"
              placeholder="e.g. 150"
              min="1"
            />
            <button class="submit-btn" onclick="addLookupLog()">
              + Add Entry
            </button>
          </div>
        </div>

        <p class="log-section-title">Today's Log</p>
        <div id="logList">
          <div class="empty-state">
            No entries yet — add your first meal above.
          </div>
        </div>
      </div>
    </div>

    <!-- ── Manual Entry Popup ── -->
    <div
      id="manualOverlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        overflow-y: auto;
      "
    >
      <div
        style="
          background: white;
          max-width: 480px;
          margin: 40px auto;
          border-radius: 14px;
          padding: 28px;
          position: relative;
        "
      >
        <button
          onclick="closeManual()"
          style="
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #999;
          "
        >
          &times;
        </button>

        <h2 style="font-size: 22px; font-weight: 900; margin-bottom: 6px">
          Add Food Manually
        </h2>
        <p style="color: #999; font-size: 13px; margin-bottom: 20px">
          Saves the food to the database and logs it for today.
        </p>

        <div
          id="manualError"
          style="
            display: none;
            background: #fdf0ef;
            border: 1.5px solid #f5c6c2;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: #c0392b;
            font-size: 13px;
          "
        ></div>

        <label class="popup-label">Food Name *</label>
        <input
          type="text"
          id="m_food_name"
          placeholder="e.g. Grilled Chicken Breast"
          class="popup-input"
        />

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
          <div>
            <label class="popup-label">Calories (kcal) *</label>
            <input
              type="number"
              id="m_calories"
              placeholder="e.g. 165"
              min="0"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Energy (kJ)</label>
            <input
              type="number"
              id="m_energy"
              placeholder="e.g. 690"
              min="0"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Protein (g)</label>
            <input
              type="number"
              id="m_protein"
              placeholder="e.g. 31"
              min="0"
              step="0.1"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Fat (g)</label>
            <input
              type="number"
              id="m_fat"
              placeholder="e.g. 3.6"
              min="0"
              step="0.1"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Carbs (g)</label>
            <input
              type="number"
              id="m_carbs"
              placeholder="e.g. 0"
              min="0"
              step="0.1"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Fibre (g)</label>
            <input
              type="number"
              id="m_fibre"
              placeholder="e.g. 0"
              min="0"
              step="0.1"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Sugars (g)</label>
            <input
              type="number"
              id="m_sugars"
              placeholder="e.g. 0"
              min="0"
              step="0.1"
              class="popup-input"
            />
          </div>
          <div>
            <label class="popup-label">Sodium (mg)</label>
            <input
              type="number"
              id="m_sodium"
              placeholder="e.g. 74"
              min="0"
              step="0.1"
              class="popup-input"
            />
          </div>
        </div>

        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee" />
        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-items: start;
          "
        >
          <div>
            <label class="popup-label">Quantity (grams) *</label>
            <input
              type="number"
              id="m_quantity"
              placeholder="e.g. 150"
              min="1"
              class="popup-input"
            />
          </div>
          <div style="display: flex; flex-direction: column">
            <label class="popup-label">Meal Type *</label>
            <select id="m_meal_type" class="popup-input">
              <option value="">Select meal type</option>
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
              <option value="snack">Snack</option>
            </select>
          </div>
        </div>
        <button
          onclick="submitManual()"
          id="manualSubmitBtn"
          style="
            width: 100%;
            padding: 14px;
            background: #007bb8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
          "
        >
          + Save &amp; Log Food
        </button>
      </div>
    </div>
    <script src="logCalories.js"></script>
  </body>
</html>
