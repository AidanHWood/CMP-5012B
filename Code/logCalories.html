<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Log Calories</title>
        <link rel="stylesheet" href="homepage.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <header class="navbar">

            <nav>
                <input type="checkbox" id="menu-toggle" />
                <label for="menu-toggle" class="menu-icon">☰</label>
                <ul class="nav-links">
                    <li><a href="homepage.html">Homepage</a></li>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="logCalories.html">Log Calories</a></li>
                    <li><a href="logExercise.html">Log Exercise</a></li>
                    <li><a href="userSettings.html">User Settings</a></li>
                </ul>
            </nav>
        </header>

        <a href="homepage.html" class="site-title">
            Temp title 
        </a>
        <a class="sub-title">
            Log Calories
        </a>

        <div class="form-container">
            <h2>Log Food</h2>

            <form id="foodForm">
                <input type="text" id="food" placeholder="Food (e.g. Chicken)" required>

                <input type="number" id="calories" placeholder="Calories" required>

                <input type="number" id="protein" placeholder="Protein (g)">
                <input type="number" id="carbs" placeholder="Carbs (g)">
                <input type="number" id="fibre" placeholder="Fibre (g)">

                <button type="submit">Add Entry</button>
            </form>
        </div>
    </body>
    <script id="submit-handler">
            document.getElementById('foodForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const data = {
                    food: document.getElementById('food').value,
                    calories: document.getElementById('calories').value,
                    protein: document.getElementById('protein').value,
                    carbs: document.getElementById('carbs').value,
                    fibre: document.getElementById('fibre').value
                };

                await fetch('/add-food', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                alert("Food logged!");
            });
    </script>
</html>
